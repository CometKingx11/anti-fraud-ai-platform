{% extends "base.html" %}

{% block title %}登录 - 反诈风险评估平台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4>大学生反诈风险评估平台</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {{ form.hidden_tag() if form else '' }}
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="mb-3">
                        <label class="form-label">学号</label>
                        <input type="text" name="student_id" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-2 text-muted">
                    还没有账号？
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">
                        <i class="fas fa-user-plus me-1"></i>立即注册
                    </a>
                </p>
                <small class="text-muted">学生自助注册后请联系管理员审核激活</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
